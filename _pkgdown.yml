url: https://giobuzala.github.io/surveyorso/

home:
  title: surveyorso

template:
  bootstrap: 5

navbar:
  structure:
    left: [reference]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/giobuzala/surveyorso
      aria-label: GitHub

reference:
  - title: Tabulation
    contents:
      - tab
      - tab_all
      - tab_mr
      - tab_mr_all
      - tab_grid
      - tab_grid_all
      - tab_grid_t
      - tab_grid_t_all

  - title: Tracking
