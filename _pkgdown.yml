      - merge_waves

  - title: Statistical
    contents:
      - standardize
      - normalize
      - one_hot_encode
      - cor_matrix
      - cor_heatmap

  - title: Segmentation
    contents:
      - kmeans_grid

  - title: Data quality
    contents:
      - strline
      - lowqual_gpt

  - title: Open-ended coding
    contents:
      - export_coding
      - import_coding
      - theme_gpt
      - code_gpt
      - code_gpt_to_df
      - code_gpt_to_excel

  - title: Helpers
